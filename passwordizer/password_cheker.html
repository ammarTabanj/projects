<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <link rel="icon" href="">
    <link rel="stylesheet" href="/passwordizer.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>password Checker</title>
</head>
<body>
    <h1 ><span id="header">Password</span>izer</h1>
    <h2><span id="header">Password</span> Checker</h2>
    <input type="text" id="password-input" placeholder="Enter your password please ..."> <br>
    <button id="check-button">Check Password</button>
    <div id="terms">
        <div class="terms">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/checkmark-cross/cross-white-icon.png" alt="cross_icon">
            <p>Password must contain 8 characters at least</p><br>
        </div>
        <div class="terms">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/checkmark-cross/cross-white-icon.png" alt="cross_icon">
            <p>Password must include one special character at least</p><br>
        </div>
        <div class="terms">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/checkmark-cross/cross-white-icon.png" alt="cross_icon">
            <p>Password must include one number at least</p>
        </div>
        <div class="terms">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/checkmark-cross/cross-white-icon.png" alt="cross_icon">
            <p>Password must include one uppercase letter at least</p>
        </div>
        <div class="terms">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/checkmark-cross/cross-white-icon.png" alt="cross_icon">
            <p>Password must include one lowercase letter at least</p>


        </div>
    </div>
</body>
</html>
